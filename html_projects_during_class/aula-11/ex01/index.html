<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1>Dados da conta</h1>
    </header>
    <main>
        <img src="./form1_back.jpg">
        <form action="submit">
            <fieldset>
                <legend>Dados Pessoais:</legend>
                <div class="inpLabel"><label>Nome:<input class="tamanho" type="text"></label> <br></div>
                <div class="inpLabel"><label>Email:<input class="tamanho" type="email"></label> </div>
            </fieldset>
            <fieldset>
                <legend>Dados da Conta:</legend>
                <div class="inpLabel"><label>Senha:</label> <input type="password" class="tamanho"><br></div>
                <div class="inpLabel"><label class="labelBr">Frase opcional:</label> <textarea class="tamanho"></textarea></div>
            </fieldset>
            <button>enviar</button>
        </form>
    </main>
</body>
</html>
